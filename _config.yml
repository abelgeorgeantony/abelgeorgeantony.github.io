title: Personal Site
email: social.abelgeorgeantony@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  This is just my personal site.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://abelgeorgeantony.github.io" # the base hostname & protocol for your site, e.g. http://example.com
instagram_username: abelgeorgeantony
github_username: abelgeorgeantony

# Build settings
theme:
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
exclude:
  - gallery/vendor
  - gallery/_site
  - gallery/.git
  - vendor
  - _site
  - .git

include:
  - .well-known